[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["foundry_lib"]
solc_version = "0.8.4"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=node_modules/@openzeppelin/"]

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}" }
